<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BACKROOMS - TRUE MULTI-TOUCH VHS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; }
        canvas { display: block; filter: contrast(1.2) brightness(0.8) saturate(0.8); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #rec-info {
            position: absolute; top: 30px; left: 30px; color: #fff; font-family: 'Courier New', monospace;
            font-size: 18px; text-shadow: 2px 2px #000; opacity: 0.8;
        }
        .blink { animation: blink-anim 1s steps(2) infinite; color: #f00; }
        @keyframes blink-anim { 0% { opacity: 0; } }
        .vhs-time { position: absolute; bottom: 30px; right: 30px; color: #fff; font-family: 'Courier New', monospace; text-align: right; font-size: 14px; line-height: 1.2; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #444; display: flex; align-items: center;
            justify-content: center; z-index: 100; font-family: monospace; letter-spacing: 5px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay">INITIALIZING TAPE... [TAP]</div>
    <div id="ui">
        <div id="rec-info"><span class="blink">●</span>REC</div>
        <div class="vhs-time">MAY. 09 1991<br>PM 11:04:22</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        let scene, camera, renderer, composer, clock;
        let audio;
        const objects = new Map(), wallMeshes = [];
        
        // 操作管理
        const input = {
            moveId: null, lookId: null,
            moveStart: new THREE.Vector2(),
            moveVec: new THREE.Vector2(),
            lookPrev: new THREE.Vector2(),
            isMoving: false
        };

        const player = { walkingTimer: 0 };

        const VHSShader = {
            uniforms: { "tDiffuse": { value: null }, "time": { value: 0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float time; varying vec2 vUv;
                float noise(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
                void main() {
                    vec2 uv = vUv;
                    // Heavy Tracking Jitter
                    float slit = step(0.98, noise(vec2(time * 10.0, uv.y * 0.05)));
                    uv.x += slit * (noise(vec2(time, uv.y)) - 0.5) * 0.05;

                    // RGB Shift
                    float amount = 0.005 * (1.0 + sin(time * 0.5));
                    vec3 col;
                    col.r = texture2D(tDiffuse, uv + vec2(amount, 0.0)).r;
                    col.g = texture2D(tDiffuse, uv).g;
                    col.b = texture2D(tDiffuse, uv - vec2(amount, 0.0)).b;

                    // Tape Grain & Scanlines
                    col += (noise(uv + time) - 0.5) * 0.2;
                    col *= 0.9 + 0.1 * sin(uv.y * 1000.0 + time * 10.0);
                    
                    // Old film yellowing
                    col.rg += 0.02;

                    float vig = smoothstep(0.8, 0.2, length(vUv - 0.5));
                    gl_FragColor = vec4(col * vig, 1.0);
                }
            `
        };

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x5a5430);
            scene.fog = new THREE.Fog(0x5a5430, 1, 20);

            camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 50);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio * 0.5); // かなり低解像度に
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const vhsPass = new ShaderPass(VHSShader);
            composer.addPass(vhsPass);

            clock = new THREE.Clock();

            // Audio
            const listener = new THREE.AudioListener();
            camera.add(listener);
            audio = new THREE.Audio(listener);
            new THREE.AudioLoader().load('hum.mp3', (buffer) => {
                audio.setBuffer(buffer); audio.setLoop(true); audio.setVolume(0.4);
            });

            setupMultiTouch();
            animate();
        }

        function createChunk(x, z) {
            const key = `${x},${z}`;
            if (objects.has(key)) return;
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: 0x6a6440 });
            
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), mat);
            floor.rotation.x = -Math.PI/2; group.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), new THREE.MeshBasicMaterial({color:0x4a4420}));
            ceil.rotation.x = Math.PI/2; ceil.position.y = 3.2; group.add(ceil);

            if (Math.random() > 0.8) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(6, 3.2, 0.3), mat);
                w.position.y = 1.6;
                if(Math.random() > 0.5) w.rotation.y = Math.PI/2;
                group.add(w); wallMeshes.push(w);
            }

            group.position.set(x * 6, 0, z * 6);
            scene.add(group); objects.set(key, group);
        }

        function setupMultiTouch() {
            window.addEventListener('touchstart', e => {
                for (let t of e.changedTouches) {
                    if (t.clientX < window.innerWidth / 2) { // 左半分：移動
                        input.moveId = t.identifier;
                        input.moveStart.set(t.clientX, t.clientY);
                        input.isMoving = true;
                    } else { // 右半分：視点
                        input.lookId = t.identifier;
                        input.lookPrev.set(t.clientX, t.clientY);
                    }
                }
            }, {passive: false});

            window.addEventListener('touchmove', e => {
                e.preventDefault();
                for (let t of e.changedTouches) {
                    if (t.identifier === input.moveId) {
                        input.moveVec.set((t.clientX - input.moveStart.x) * 0.01, -(t.clientY - input.moveStart.y) * 0.01);
                    } else if (t.identifier === input.lookId) {
                        camera.rotation.y -= (t.clientX - input.lookPrev.x) * 0.005;
                        camera.rotation.x -= (t.clientY - input.lookPrev.y) * 0.005;
                        camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
                        input.lookPrev.set(t.clientX, t.clientY);
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', e => {
                for (let t of e.changedTouches) {
                    if (t.identifier === input.moveId) { input.isMoving = false; input.moveVec.set(0,0); input.moveId = null; }
                    if (t.identifier === input.lookId) { input.lookId = null; }
                }
            });

            document.getElementById('overlay').onclick = () => {
                document.getElementById('overlay').style.display = 'none';
                if(audio.buffer) audio.play();
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (input.isMoving) {
                const dir = new THREE.Vector3(input.moveVec.x, 0, -input.moveVec.y).applyEuler(new THREE.Euler(0, camera.rotation.y, 0));
                camera.position.add(dir.multiplyScalar(0.12));
                player.walkingTimer += 0.15;
            }

            // Head Bob
            const bob = Math.sin(player.walkingTimer * 0.8) * 0.04;
            camera.position.y = 1.6 + bob + Math.sin(time * 0.5) * 0.01;
            camera.rotation.z = Math.sin(player.walkingTimer * 0.4) * 0.01;

            // Chunking
            const cx = Math.round(camera.position.x / 6), cz = Math.round(camera.position.z / 6);
            for(let i=-3; i<=3; i++) for(let j=-3; j<=3; j++) createChunk(cx+i, cz+j);

            composer.passes[1].uniforms.time.value = time;
            composer.render();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms - High-Res 3D with VHS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; font-family: 'Courier New', Courier, monospace; }
        /* canvasのピクセル化CSSを削除し、3D描画を滑らかに */
        canvas { display: block; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 録画UI (Found Footage風) - 画面の歪みの影響を受けない */
        #rec-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            color: #eee; font-size: 16px; padding: 20px; box-sizing: border-box;
            text-shadow: 2px 2px #000; opacity: 0.8;
        }
        .rec-dot { color: #f00; animation: blink 1s steps(2) infinite; }
        @keyframes blink { 0% { opacity: 0; } }
        .timestamp { position: absolute; bottom: 20px; right: 20px; text-align: right; line-height: 1.2; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="rec-ui">
            <div><span class="rec-dot">●</span>REC</div>
            <div>PLAY ▶</div>
            <div class="timestamp">
                MAY. 09 1991<br>
                PM 11:04:22
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { LuminosityHighPassShader } from 'three/addons/shaders/LuminosityHighPassShader.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const GRID_SIZE = 6; 
        const VIEW_DISTANCE = 6;
        const WALL_HEIGHT = 3.2;
        const PLAYER_HEIGHT = 1.6;

        let scene, camera, renderer, composer, clock, frameCount = 0;
        const objects = new Map();
        const wallMeshes = []; 
        const lampData = []; 
        const floorMeshes = []; 

        const controls = { moveVec: new THREE.Vector2(), isMoving: false };
        let touchData = { moveId: null, lookId: null, moveStart: new THREE.Vector2(), lookPrev: new THREE.Vector2() };

        // Found Footage風のくすんだ色調
        const AMBIENT_LEVEL = 0.1; 
        const BASE_COLOR = new THREE.Color(0x6a654a); 
        const LIGHT_COLOR = new THREE.Color(0xfffce0);

        // --- VHS Shader Definition (Custom Post-processing) ---
        const VHSShader = {
            uniforms: {
                "tDiffuse": { value: null },
                "time": { value: 0.0 },
                "range": { value: 0.015 }, // RGBズレの強さ
                "distortion": { value: 0.08 } // レンズ歪みの強さ
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float time;
                uniform float range;
                uniform float distortion;
                varying vec2 vUv;

                // 擬似ランダムノイズ
                float noise(vec2 p) {
                    return fract(sin(dot(p.xy, vec2(12.9898, 78.233))) * 43758.5453);
                }

                void main() {
                    // --- 1. レンズ歪み（魚眼） ---
                    vec2 coord = vUv - 0.5;
                    float u_dist = length(coord);
                    coord *= 1.0 + u_dist * u_dist * distortion;
                    vec2 uv = coord + 0.5;

                    // 画面外の処理
                    if(uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                        return;
                    }

                    // --- 2. RGBズレ（Chromatic Aberration） ---
                    // 画面の端に行くほどズレを大きくする
                    float shift = range * u_dist * (sin(time * 0.5) * 0.1 + 0.9);
                    
                    vec4 colR = texture2D(tDiffuse, uv + vec2(shift, 0.0));
                    vec4 colG = texture2D(tDiffuse, uv);
                    vec4 colB = texture2D(tDiffuse, uv - vec2(shift, 0.0));

                    vec3 finalColor = vec3(colR.r, colG.g, colB.b);

                    // --- 3. 動的ノイズ & 走査線 ---
                    float n = noise(uv * time);
                    finalColor += (n - 0.5) * 0.15; // 砂嵐ノイズ

                    // 走査線
                    float scanline = sin(uv.y * 800.0 + time * 10.0) * 0.04;
                    finalColor -= scanline;

                    // --- 4. ビネット（四隅を暗く） & 画面の明滅 ---
                    float vignette = 1.0 - u_dist * 1.5;
                    vignette = pow(vignette, 0.7); // 効き具合
                    finalColor *= vignette;
                    
                    // 不規則なシグナルノイズ（画面全体の明るさ変動）
                    finalColor *= (1.0 + (noise(vec2(time, time)) - 0.5) * 0.05);

                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `
        };

        init();
        animate();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            const fogColor = 0x8e8860; 
            scene.background = new THREE.Color(fogColor);
            
            // --- フォグの範囲を遠くに拡大 (1, 15 -> 5, 30) ---
            scene.fog = new THREE.Fog(fogColor, 5, 30); 

            camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 50);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, PLAYER_HEIGHT, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            
            // --- 3Dの解像度（ピクセル数）を大幅に上げる (roughScale: 0.85 -> 1.0) ---
            const targetWidth = window.innerWidth;
            const targetHeight = window.innerHeight;
            const roughScale = 1.0; // 元の解像度で描画 (ピクセル数を最大に)
            renderer.setSize(targetWidth * roughScale, targetHeight * roughScale, false);
            
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            renderer.setPixelRatio(window.devicePixelRatio); // デバイスピクセル比も利用
            document.body.appendChild(renderer.domElement);

            //ポストプロセス設定
            composer = new EffectComposer(renderer);
            
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.8; // 明るい場所だけ滲ませる
            bloomPass.strength = 0.6; // 滲みの強さ
            bloomPass.radius = 0.5; // 滲みの広がり
            composer.addPass(bloomPass);

            // VHSディストーション（カスタムシェーダー）- ここはそのまま
            const vhsPass = new ShaderPass(VHSShader);
            vhsPass.renderToScreen = true;
            composer.addPass(vhsPass);

            setupMobileControls();
        }

        function createChunk(key, x, z) {
            const chunk = new THREE.Group();
            // 床: 頂点カラーを細かく、ピクセル数を上げるためセグメントを維持
            const floorGeo = new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE, 6, 6);
            const floorMat = new THREE.MeshBasicMaterial({ vertexColors: true });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            chunk.add(floor);
            floorMeshes.push(floor);

            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE), new THREE.MeshBasicMaterial({ color: 0x8a855a }));
            ceil.rotation.x = Math.PI / 2; ceil.position.y = WALL_HEIGHT; chunk.add(ceil);

            const hasWall = getSeedRandom(x, z) > 0.82;
            if (hasWall) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(GRID_SIZE, WALL_HEIGHT, 0.25), new THREE.MeshBasicMaterial({ color: 0x8b8550 }));
                wall.position.y = WALL_HEIGHT / 2;
                if (getSeedRandom(z, x) > 0.5) wall.rotation.y = Math.PI / 2;
                chunk.add(wall);
                wallMeshes.push(wall);
                wall.userData.chunkKey = key;
            } else if (getSeedRandom(x, z, 999) > 0.6) {
                const typeRand = getSeedRandom(x, z, 111);
                let type = (typeRand < 0.15) ? "flicker" : (typeRand < 0.2) ? "off" : "normal";
                
                const lamp = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 2.5), new THREE.MeshBasicMaterial({ color: type === "off" ? 0x111111 : 0xffffff }));
                lamp.position.set(0, WALL_HEIGHT - 0.05, 0);
                chunk.add(lamp);
                
                lampData.push({ 
                    key, mesh: lamp, x: x * GRID_SIZE, z: z * GRID_SIZE, type, 
                    intensity: type === "off" ? 0 : 1, nextStatusChange: 0 
                });
            }

            chunk.position.set(x * GRID_SIZE, 0, z * GRID_SIZE);
            scene.add(chunk);
            objects.set(key, chunk);
        }

        function removeChunk(key, obj) {
            scene.remove(obj);
            const fIdx = floorMeshes.findIndex(f => f.parent === obj);
            if(fIdx > -1) floorMeshes.splice(fIdx, 1);
            for (let i = wallMeshes.length - 1; i >= 0; i--) if (wallMeshes[i].userData.chunkKey === key) wallMeshes.splice(i, 1);
            for (let i = lampData.length - 1; i >= 0; i--) if (lampData[i].key === key) lampData.splice(i, 1);
            obj.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose(); });
            objects.delete(key);
        }

        function updateWorld() {
            const pX = Math.round(camera.position.x / GRID_SIZE);
            const pZ = Math.round(camera.position.z / GRID_SIZE);
            const currentKeys = new Set();
            for (let x = pX - VIEW_DISTANCE; x <= pX + VIEW_DISTANCE; x++) {
                for (let z = pZ - VIEW_DISTANCE; z <= pZ + VIEW_DISTANCE; z++) {
                    const key = `${x},${z}`; currentKeys.add(key);
                    if (!objects.has(key)) createChunk(key, x, z);
                }
            }
            for (const [key, obj] of objects.entries()) {
                if (!currentKeys.has(key)) removeChunk(key, obj);
            }
        }

        function updateLighting() {
            lampData.forEach(l => {
                if (l.type === "flicker" && frameCount >= l.nextStatusChange) {
                    const isLit = l.intensity > 0.5;
                    l.intensity = isLit ? 0.2 : 1.0;
                    l.mesh.material.color.setHex(l.intensity > 0.5 ? 0xffffff : 0x222222);
                    l.nextStatusChange = frameCount + (l.intensity > 0.5 ? Math.random() * 120 + 30 : Math.random() * 7 + 2);
                }
            });

            floorMeshes.forEach(f => {
                const posAttr = f.geometry.attributes.position;
                const colors = [];
                const worldPos = new THREE.Vector3();
                for (let i = 0; i < posAttr.count; i++) {
                    worldPos.fromBufferAttribute(posAttr, i);
                    f.localToWorld(worldPos);
                    let lightFactor = 0;
                    // --- 光の計算範囲をわずかに拡大 (7.5) ---
                    const nearby = lampData.filter(l => Math.abs(l.x - worldPos.x) < 8.5 && Math.abs(l.z - worldPos.z) < 8.5);
                    nearby.forEach(l => {
                        const d = Math.sqrt((worldPos.x - l.x)**2 + (worldPos.z - l.z)**2);
                        lightFactor += Math.max(0, 1 - (d / 7.5))**2 * l.intensity;
                    });
                    const c = BASE_COLOR.clone().lerp(LIGHT_COLOR, Math.min(1, lightFactor * 0.7));
                    colors.push(Math.min(1, c.r + AMBIENT_LEVEL), Math.min(1, c.g + AMBIENT_LEVEL), Math.min(1, c.b + AMBIENT_LEVEL));
                }
                f.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                f.geometry.attributes.color.needsUpdate = true;
            });
        }

        function setupMobileControls() {
            window.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2) { touchData.moveId = t.identifier; touchData.moveStart.set(t.clientX, t.clientY); controls.isMoving = true; }
                    else { touchData.lookId = t.identifier; touchData.lookPrev.set(t.clientX, t.clientY); }
                }
            }, {passive: false});
            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === touchData.moveId) {
                        const dx = t.clientX - touchData.moveStart.x, dy = t.clientY - touchData.moveStart.y;
                        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50), angle = Math.atan2(dy, dx);
                        controls.moveVec.set(Math.cos(angle) * (dist/50), -Math.sin(angle) * (dist/50));
                    }
                    if (t.identifier === touchData.lookId) {
                        camera.rotation.y -= (t.clientX - touchData.lookPrev.x) * 0.004;
                        camera.rotation.x -= (t.clientY - touchData.lookPrev.y) * 0.004;
                        camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
                        touchData.lookPrev.set(t.clientX, t.clientY);
                    }
                }
            }, {passive: false});
            window.addEventListener('touchend', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const t = e.changedTouches[i];
                    if (t.identifier === touchData.moveId) { controls.isMoving = false; touchData.moveId = null; controls.moveVec.set(0,0); }
                    if (t.identifier === touchData.lookId) touchData.lookId = null;
                }
            });
        }

        function getSeedRandom(x, z, offset = 0) {
            const f = Math.sin((x + offset) * 12.9898 + z * 78.233) * 43758.5453;
            return f - Math.floor(f);
        }

        function animate() {
            requestAnimationFrame(animate);
            frameCount++;
            const time = clock.getElapsedTime();

            // 手ブレ
            const shake = Math.sin(time * 2.0) * 0.01 + (Math.random() - 0.5) * 0.005;
            camera.position.y = PLAYER_HEIGHT + shake;
            camera.rotation.z = Math.sin(time * 0.5) * 0.012; 

            if (controls.isMoving) {
                const dir = new THREE.Vector3(controls.moveVec.x, 0, -controls.moveVec.y).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const ray = new THREE.Raycaster(camera.position, dir, 0, 0.7);
                if (ray.intersectObjects(wallMeshes).length === 0) camera.position.addScaledVector(dir, 0.08);
                
                // 歩行時の大きな揺れ
                const footstep = Math.sin(time * 12.0);
                camera.position.y += footstep * 0.05;
                camera.rotation.x += footstep * 0.005; 
            }

            // VHSシェーダーへの時間供給
            if (composer.passes[2]) {
                composer.passes[2].uniforms.time.value = time;
            }

            if (frameCount % 3 === 0) {
                updateWorld();
                updateLighting();
            }

            // renderer.renderではなく、composer.renderを使う
            composer.render();
        }
    </script>
</body>
</html>

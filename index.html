<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE BACKROOMS - ABSOLUTE IMMERSION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; cursor: none; }
        canvas { display: block; filter: contrast(1.1) brightness(0.9); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #vhs-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
        }
        #rec-info {
            position: absolute; top: 30px; left: 30px; color: #fff; font-family: 'monospace';
            font-size: 18px; text-shadow: 2px 2px #000; opacity: 0.7;
        }
        .blink { animation: blink-anim 1s steps(2) infinite; color: #f00; }
        @keyframes blink-anim { 0% { opacity: 0; } }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #555; display: flex; align-items: center;
            justify-content: center; z-index: 100; font-family: monospace; letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div id="overlay">SYNCING... [TAP]</div>
    <div id="ui">
        <div id="vhs-overlay"></div>
        <div id="rec-info"><span class="blink">●</span> REC  00:04:31:12</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        let scene, camera, renderer, composer, clock;
        let audio, audioBuffer;
        const walls = [], objects = new Map();
        
        // プレイヤーの状態
        const player = {
            pos: new THREE.Vector3(0, 1.6, 0),
            vel: new THREE.Vector3(),
            rot: new THREE.Euler(0, 0, 0, 'YXZ'),
            lookVel: new THREE.Vector2(),
            walkingTimer: 0
        };

        const controls = { move: new THREE.Vector2(), active: false };
        let touchStart = new THREE.Vector2(), lookPrev = new THREE.Vector2();

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7a7444);
            scene.fog = new THREE.Fog(0x7a7444, 2, 25);

            camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 50);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio * 0.7); // 意図的に解像度を落とす
            document.body.appendChild(renderer.domElement);

            // VHS Shader (Modified for more grit)
            const vhsPass = new ShaderPass({
                uniforms: { "tDiffuse": { value: null }, "time": { value: 0 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform sampler2D tDiffuse; uniform float time; varying vec2 vUv;
                    float noise(vec2 p) { return fract(sin(dot(p, vec2(12.98, 78.23))) * 43758.54); }
                    void main() {
                        vec2 uv = vUv;
                        float d = length(uv - 0.5);
                        uv.x += (noise(vec2(time, uv.y)) - 0.5) * 0.002; // Line jitter
                        vec4 col = texture2D(tDiffuse, uv);
                        col.rgb += (noise(uv + time) - 0.5) * 0.15; // Grain
                        float vig = smoothstep(0.8, 0.2, d);
                        gl_FragColor = vec4(col.rgb * vig, 1.0);
                    }
                `
            });

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            composer.addPass(vhsPass);

            clock = new THREE.Clock();

            // Audio
            const listener = new THREE.AudioListener();
            camera.add(listener);
            audio = new THREE.Audio(listener);
            new THREE.AudioLoader().load('hum.mp3', (buffer) => {
                audio.setBuffer(buffer); audio.setLoop(true); audio.setVolume(0.5);
            });

            setupInput();
            animate();
        }

        function setupInput() {
            window.addEventListener('touchstart', e => {
                const t = e.touches[0];
                if (t.clientX < window.innerWidth / 2) { touchStart.set(t.clientX, t.clientY); controls.active = true; }
                else { lookPrev.set(t.clientX, t.clientY); }
            }, {passive: false});

            window.addEventListener('touchmove', e => {
                e.preventDefault();
                for(let t of e.touches) {
                    if (t.clientX < window.innerWidth / 2) {
                        controls.move.set((t.clientX - touchStart.x) * 0.02, -(t.clientY - touchStart.y) * 0.02);
                    } else {
                        player.lookVel.x = (t.clientX - lookPrev.x) * 0.005;
                        player.lookVel.y = (t.clientY - lookPrev.y) * 0.005;
                        lookPrev.set(t.clientX, t.clientY);
                    }
                }
            }, {passive: false});

            window.addEventListener('touchend', () => { controls.active = false; controls.move.set(0,0); });
            document.getElementById('overlay').onclick = () => {
                document.getElementById('overlay').style.display = 'none';
                if(audio.buffer) audio.play();
            };
        }

        function createChunk(x, z) {
            const key = `${x},${z}`;
            if (objects.has(key)) return;
            const group = new THREE.Group();
            
            // Floor/Ceil
            const mat = new THREE.MeshBasicMaterial({ color: 0x8a8454 });
            const f = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), mat);
            f.rotation.x = -Math.PI/2; group.add(f);
            const c = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), mat);
            c.rotation.x = Math.PI/2; c.position.y = 3.5; group.add(c);

            // Random Wall
            if (Math.random() > 0.7) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8, 3.5, 0.5), new THREE.MeshBasicMaterial({color: 0x7a7444}));
                w.position.y = 1.75;
                if(Math.random() > 0.5) w.rotation.y = Math.PI/2;
                group.add(w); walls.push(w);
            }

            // Light Mesh
            if (Math.random() > 0.8) {
                const l = new THREE.Mesh(new THREE.PlaneGeometry(1, 2), new THREE.MeshBasicMaterial({color: 0xffffee}));
                l.position.set(0, 3.49, 0); l.rotation.x = Math.PI/2; group.add(l);
            }

            group.position.set(x * 8, 0, z * 8);
            scene.add(group); objects.set(key, group);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.elapsedTime;

            // Look inertia
            player.rot.y -= player.lookVel.x;
            player.rot.x -= player.lookVel.y;
            player.rot.x = Math.max(-1.2, Math.min(1.2, player.rot.x));
            player.lookVel.multiplyScalar(0.9);

            // Movement with physics feel
            if (controls.active) {
                const dir = new THREE.Vector3(controls.move.x, 0, -controls.move.y).applyEuler(new THREE.Euler(0, player.rot.y, 0));
                player.vel.add(dir.multiplyScalar(dt * 5));
                player.walkingTimer += dt * 8;
            }
            player.vel.multiplyScalar(0.9); 
            camera.position.add(player.vel);
            
            // "Human" Camera Motion (Footsteps & Sway)
            const bob = Math.sin(player.walkingTimer) * player.vel.length() * 0.5;
            const sway = Math.cos(player.walkingTimer * 0.5) * player.vel.length() * 0.2;
            
            camera.position.y = 1.6 + bob + (Math.sin(time * 0.5) * 0.02); // Breathing + Walk
            camera.rotation.set(player.rot.x + (bob * 0.1), player.rot.y + sway, sway * 0.5);

            // Chunk management
            const cx = Math.round(camera.position.x / 8), cz = Math.round(camera.position.z / 8);
            for(let i=-3; i<=3; i++) for(let j=-3; j<=3; j++) createChunk(cx+i, cz+j);

            composer.passes[1].uniforms.time.value = time;
            composer.render();
        }
    </script>
</body>
</html>
